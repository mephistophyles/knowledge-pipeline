# CI — runs on every push to main and every PR. Build + test happen HERE, never
# on the EC2 box. The `docker-build` job proves the deploy artifact (the image)
# builds cleanly; the deploy workflow (added once the registry is settled) will
# push that same image and have the box pull it.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Run tests
        run: uv run --frozen --python 3.12 pytest -q

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: knowledge-pipeline:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
