# Knowledge pipeline — global config. Model registry, storage selector, paths, thresholds.
pipeline_version: "0.1.0"

paths:
  db: data/pipeline.db
  intermediate: data/intermediate
  vault: vault

storage:
  # The ONLY cloud-specific abstraction (plan §14). Flip to `s3` for EC2; nothing else changes.
  blobstore: local        # local | s3
  local:
    root: data/raw        # content-addressed: <root>/sha256/ab/cd/<hash>/artifact.*
  s3:
    bucket: change-me
    prefix: raw
    region: us-east-1

# Providers — declared once, referenced by the per-stage `models` map below.
# All three speak the OpenAI-compatible API, so one adapter serves them; they
# differ only in base_url / key / model-ids. `pricing` (USD per 1M tokens) feeds
# the cost ledger — omit it (Ollama, local) and cost is recorded as 0.
providers:
  openai:
    type: openai_compat
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY
    supports_batch: true          # OpenAI Batch API (50% off) — execution is a later PR
    pricing:
      gpt-4o-mini: {in: 0.15, out: 0.60}
      gpt-4o:      {in: 2.50, out: 10.00}
  openrouter:
    type: openai_compat
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    # no batch discount → runs bounded-concurrency async (later PR)
    # USD per 1M tokens, from OpenRouter's live model list (openrouter.ai/api/v1/models).
    # Model ids are OpenRouter slugs (note the dots, e.g. claude-haiku-4.5).
    pricing:
      anthropic/claude-haiku-4.5: {in: 1.00, out: 5.00}
      anthropic/claude-sonnet-5:  {in: 2.00, out: 10.00}
      openai/gpt-5-mini:          {in: 0.25, out: 2.00}
      openai/gpt-5.1:             {in: 1.25, out: 10.00}
      poolside/laguna-s-2.1:      {in: 0.10, out: 0.20}   # promo :free slug is $0; this is the post-promo rate
      poolside/laguna-s-2.1:free: {in: 0.00, out: 0.00}
      # Strong-model bracket — the extraction quality CEILING. If v3 is clean here,
      # the prompt is done; then measure how far down the cost ladder quality holds.
      z-ai/glm-5.2:               {in: 0.79, out: 2.49}
      deepseek/deepseek-v4-pro:   {in: 0.44, out: 0.87}
      # Cheap+fast, non-reasoning — TRIAGE + dedup-confirm model (validated).
      # Whole Insight triage pass (~3.3k emails) ≈ $0.65; a fraction of local-gemma wall-time.
      deepseek/deepseek-v4-flash: {in: 0.098, out: 0.196}
      # EXTRACTION model (bake-off winner): reliable, ~GLM-5.2 quality, ~30% cheaper.
      # A `:free` slug exists ($0, shared-pool daily cap) for zero-cost runs; this is paid.
      nvidia/nemotron-3-ultra-550b-a55b: {in: 0.50, out: 2.20}
  ollama:
    type: openai_compat
    base_url: http://localhost:11434/v1
    api_key_env: null             # keyless, local, cost 0
    timeout: 300                  # local models on a big newsletter can be slow

# Per-stage swap point (plan §6.5): each derivation stage independently picks a
# provider + model + params + prompt_version. Swap a line here to eval a different
# model/provider for that step; the generating key rides into the note frontmatter.
models:
  extract_claims:
    provider: openrouter      # bake-off winner; ollama gemma4 remains a free local fallback
    model: nvidia/nemotron-3-ultra-550b-a55b
    params: {temperature: 0, max_tokens: 4096}   # generous: reasoning models truncate small caps
    prompt_version: v4        # v4: generalize (transferable principle, not the case's facts)
    batch: false
  # The cheap model that confirms same-claim vs distinct during dedup (plan §6.3).
  # Fast non-reasoning (validated): at ~170 confirms per author's editions, gemma4's ~10s/call
  # was the seed bottleneck. prompt_version v2 tightens "same" to the same CORE assertion.
  dedup:
    provider: openrouter
    model: deepseek/deepseek-v4-flash
    params: {temperature: 0, max_tokens: 200}
    prompt_version: v2
  # Entity extraction + same-entity tiebreak (plan §6.4). One model, two prompts
  # (entities_extract / entities_confirm), both at this prompt_version.
  entities:
    provider: ollama
    model: gemma4:latest
    params: {temperature: 0}
    prompt_version: v1
  #
  # Offline / free alternative for any stage — flip provider+model to Ollama:
  #   provider: ollama
  #   model: gemma4:latest
  #   params: {temperature: 0}

# Write-time dedup embeddings (plan §6.3). Same provider layer as completions —
# nomic-embed-text runs locally on Ollama (keyless, free).
embeddings:
  provider: ollama
  model: nomic-embed-text

# Dedup tuning: a candidate matches an existing claim when its nearest neighbour's
# L2 distance (unit-normalized embeddings) is below max_distance; the top-k
# shortlist is then confirmed by the `models.dedup` model above.
# 0.72 chosen by sweep on real v4 claims (nomic embeddings): 0.6 was effectively
# dedup-OFF (near-verbatim only); 0.72 ≈ cosine 0.74 catches reworded paraphrases while
# the confirm LLM rejects far pairs. nomic beat mxbai/bge (equal quality, fewest confirms).
dedup:
  max_distance: 0.72
  shortlist_k: 5

# Entity resolution tuning (plan §6.4): after an exact (name, entity_type) string
# match, near matches within max_distance are confirmed by the entities model.
entities:
  max_distance: 0.6
  shortlist_k: 5

# Email ingestion (plan §4.1). IMAP, read-only, scoped by Gmail label. Credentials
# come from IMAP_USER / IMAP_PASSWORD (a Gmail app password); only the host is here.
#   pipeline ingest email --label "Newsletters/Author" --limit 50
email:
  host: imap.gmail.com

# Eval-compare variant sets (plan §6.5). `pipeline eval run <ref> extract_claims`
# runs the stage under each variant below, holds the artifact, and writes a
# side-by-side report of outputs + cost + latency; `pipeline eval approve <ref>
# extract_claims <#>` commits the winner and resumes the chain. Only producer
# stages are eval-able (they write no vault note). Edit these to whatever you
# want to benchmark.
evals:
  extract_claims:
    # Cost/quality spread across providers. gemma4 = free local baseline; the four
    # OpenRouter variants span cheap→strong Claude and cheap→strong GPT. prompt_version
    # v2 = the insight-focused prompt. Trim or add slugs to change the benchmark set.
    # v2-vs-v3 A/B on the strong bracket (GLM 5.2 + DeepSeek v4 Pro) — establishes the
    # extraction ceiling and isolates the prompt effect. max_tokens generous: no truncation.
    - {provider: openrouter, model: z-ai/glm-5.2,               params: {temperature: 0, max_tokens: 4096}, prompt_version: v2}
    - {provider: openrouter, model: z-ai/glm-5.2,               params: {temperature: 0, max_tokens: 4096}, prompt_version: v3}
    - {provider: openrouter, model: deepseek/deepseek-v4-pro,   params: {temperature: 0, max_tokens: 4096}, prompt_version: v2}
    - {provider: openrouter, model: deepseek/deepseek-v4-pro,   params: {temperature: 0, max_tokens: 4096}, prompt_version: v3}
    # Once the prompt is locked, add cheaper contenders to find the quality/cost floor:
    # - {provider: openrouter, model: poolside/laguna-s-2.1,      params: {temperature: 0, max_tokens: 4096}, prompt_version: v3}
    # - {provider: ollama,     model: gemma4:latest,             params: {temperature: 0, max_tokens: 4096}, prompt_version: v3}

worker:
  poll_interval_seconds: 2.0
  max_attempts: 3

# Dashboard-triggered execution (step/process). Serial by default so local Ollama
# tasks don't stampede; raise once you're on faster/hosted providers.
execution:
  max_parallel: 1
